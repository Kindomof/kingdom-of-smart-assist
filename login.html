<!DOCTYPE html>
<html>
<head>
  <title>Login - KINGDOM OF SMART ASSIST</title>
  <style>
    body { font-family: Arial; background: #0b0b0b; color: white; text-align:center; }
    h1 { color: #00ff00; margin-top:30px; }
    input { padding:10px; margin:10px; width:200px; }
    button { padding:10px 20px; background: green; color:white; border:none; cursor:pointer; }
    .form-box { margin-top:50px; border:1px solid #555; padding:20px; display:inline-block; text-align:left; }
    label { display:block; margin-top:10px; }
    #message { margin-top:20px; color: yellow; }
    a { color: #00ff00; text-decoration:none; display:block; margin-top:10px; }
  </style>
</head>
<body>
  <h1>Login</h1>
  
  <div class="form-box">
    <label>Username:</label>
    <input type="text" id="loginUser">
    <label>Password:</label>
    <input type="password" id="loginPass">
    <button onclick="login()">Login</button>
    <a href="register.html">Don't have an account? Register</a>
  </div>

  <p id="message"></p>

  <script>
    // Offline users storage (temporary)
    let users = JSON.parse(localStorage.getItem("users") || "{}");

    function login() {
      let user = document.getElementById("loginUser").value.trim();
      let pass = document.getElementById("loginPass").value.trim();
      if(users[user] && users[user].password === pass){
        document.getElementById("message").innerHTML = "Login successful! Welcome, " + user;
      } else {
        document.getElementById("message").innerHTML = "Invalid username or password!";
      }
    }
  </script>
</body>
</html>
