<!DOCTYPE html>
<html>
<head>
  <title>Login / Register - KINGDOM OF SMART ASSIST</title>
  <style>
    body { font-family: Arial; background: #0b0b0b; color: white; text-align:center; }
    h1 { color: #00ff00; margin-top:30px; }
    input { padding:10px; margin:10px; width:200px; }
    button { padding:10px 20px; background: green; color:white; border:none; cursor:pointer; }
    .form-box { margin-top:50px; border: 1px solid #333; padding: 20px; display:inline-block; }
    a { color: #00ff00; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Login / Register</h1>
  
  <!-- Login Form -->
  <div class="form-box">
    <h3>Login</h3>
    <input type="email" placeholder="Email" id="loginUser"><br>
    <input type="password" placeholder="Password" id="loginPass"><br>
    <button onclick="login()">Login</button><br>
    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
  </div>
  
  <!-- Register Form -->
  <div class="form-box">
    <h3>Register</h3>
    <input type="email" placeholder="Email" id="regUser"><br>
    <input type="password" placeholder="Password" id="regPass"><br>
    <input type="text" placeholder="Phone Number" id="regPhone"><br>
    <button onclick="register()">Register</button>
  </div>

  <p id="message"></p>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
    // 🔹 Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAwW94B97PjOnNkgDuLf6Ftf5vPsI9ObUM",
      authDomain: "kingdom-smart-assist-58105.firebaseapp.com",
      projectId: "kingdom-smart-assist-58105",
      storageBucket: "kingdom-smart-assist-58105.firebasestorage.app",
      messagingSenderId: "922622861443",
      appId: "1:922622861443:web:5497de20ffbc2b8256bbb6",
      measurementId: "G-1X5R2N96YP"
    };

    // 🔹 Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 🔹 Register function
    function register() {
      let email = document.getElementById("regUser").value;
      let password = document.getElementById("regPass").value;
      let phone = document.getElementById("regPhone").value;

      if(email && password && phone){
        auth.createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            userCredential.user.sendEmailVerification();
            document.getElementById("message").innerHTML = 
              "Registered successfully! Check your email for verification.";
          })
          .catch((error) => {
            document.getElementById("message").innerHTML = error.message;
          });
      } else {
        document.getElementById("message").innerHTML = "Fill all fields!";
      }
    }

    // 🔹 Login function
    function login() {
      let email = document.getElementById("loginUser").value;
      let password = document.getElementById("loginPass").value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          if(userCredential.user.emailVerified){
            document.getElementById("message").innerHTML = 
              "Login successful! Welcome, " + email;
          } else {
            document.getElementById("message").innerHTML = "Please verify your email first.";
          }
        })
        .catch((error) => {
          document.getElementById("message").innerHTML = error.message;
        });
    }

    // 🔹 Forgot Password function
    function forgotPassword() {
      let email = prompt("Enter your email for password reset:");
      if(email){
        auth.sendPasswordResetEmail(email)
          .then(() => {
            alert("Password reset email sent!");
          })
          .catch((error) => {
            alert(error.message);
          });
      }
    }
  </script>
</body>
</html>
