<!DOCTYPE html>
<html>
<head>
  <title>Login - KINGDOM OF SMART ASSIST</title>
  <style>
    body { font-family: Arial; background: #0b0b0b; color: white; text-align:center; }
    h1 { color: #00ff00; margin-top:30px; }
    input { padding:10px; margin:10px; width:250px; }
    button { padding:10px 20px; background: green; color:white; border:none; cursor:pointer; }
    a { color: #00ff00; text-decoration: none; }
    .form-box { margin-top:50px; }
  </style>
</head>
<body>
  <h1>Login</h1>
  
  <div class="form-box">
    <input type="text" placeholder="Username" id="loginUser"><br>
    <input type="password" placeholder="Password" id="loginPass"><br>
    <button onclick="login()">Login</button>
  </div>

  <p id="message"></p>
  <p>Don't have an account? <a href="register.html">Register here</a></p>
  <p><a href="#" onclick="forgotPassword()">Forgot Password?</a></p>

  <script>
    let users = JSON.parse(localStorage.getItem("users") || "{}");

    function login() {
      let user = document.getElementById("loginUser").value.trim();
      let pass = document.getElementById("loginPass").value.trim();

      if(users[user] && users[user].password === pass){
        document.getElementById("message").innerHTML = "Login successful! Welcome, " + user;
      } else {
        document.getElementById("message").innerHTML = "Invalid username or password!";
      }
    }

    function forgotPassword() {
      let user = prompt("Enter your username to recover password:");
      if(users[user]){
        alert("Your password is: " + users[user].password);
      } else {
        alert("Username not found!");
      }
    }
  </script>
</body>
</html>
